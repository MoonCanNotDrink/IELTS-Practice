<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your IELTS Practice password">
    <title>Reset Password - IELTS Practice</title>
    <link rel="stylesheet" href="/static/variables.css?v=1">
    <link rel="stylesheet" href="/static/base.css?v=1">
    <link rel="stylesheet" href="/static/components.css?v=1">
    <link rel="stylesheet" href="/static/layout.css?v=1">
    <link rel="stylesheet" href="/static/pages.css?v=1">
    <link rel="stylesheet" href="/static/responsive.css?v=1">
</head>
<body>
    <a class="skip-link" href="#mainContent">Skip to main content</a>
    <div class="app-container">
        <header class="app-header">
            <div class="header-controls">
                <button type="button" id="btnLogin" class="btn btn-primary header-btn-compact" onclick="showAuth()">Log In</button>
                <button type="button" id="btnLogout" class="btn btn-ghost header-btn-compact auth-logout-hidden" onclick="logout()">Log Out</button>
            </div>
            <h1>Reset Password</h1>
            <p class="subtitle">Create a new password for your IELTS Practice account.</p>
        </header>

        <nav class="page-nav page-nav-centered" aria-label="Page navigation">
            <a href="/" class="btn btn-ghost btn-link-inline page-back-link">
                &larr; Back to Home
            </a>
        </nav>

        <main id="mainContent">
            <div class="card">
                <div class="card-header">
                    <span class="icon">🔐</span>
                    <h2>Create a New Password</h2>
                </div>
                <p class="section-intro-text" id="resetPasswordIntro">
                    Validating your reset link...
                </p>
                <div id="resetPasswordError" class="auth-error"></div>
                <div id="resetPasswordStatus" class="auth-status"></div>
                <form id="resetPasswordForm" class="hidden">
                    <div class="form-group">
                        <label for="resetPasswordInput">New Password</label>
                        <div class="password-input-wrap">
                            <input type="password" id="resetPasswordInput" autocomplete="new-password" placeholder="Enter a new password">
                            <button type="button" class="password-toggle" id="resetPasswordToggle" onclick="togglePasswordVisibility('resetPasswordInput', 'resetPasswordToggle')" aria-label="Show password" aria-pressed="false">Show</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="resetPasswordConfirmInput">Confirm Password</label>
                        <div class="password-input-wrap">
                            <input type="password" id="resetPasswordConfirmInput" autocomplete="new-password" placeholder="Re-enter your new password">
                            <button type="button" class="password-toggle" id="resetPasswordConfirmToggle" onclick="togglePasswordVisibility('resetPasswordConfirmInput', 'resetPasswordConfirmToggle')" aria-label="Show password confirmation" aria-pressed="false">Show</button>
                        </div>
                    </div>
                    <div class="btn-group">
                        <button type="submit" class="btn btn-primary btn-full">Reset Password</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="/static/shared.js?v=1" charset="utf-8"></script>
    <script src="/static/reset-password.js?v=1" charset="utf-8"></script>
</body>
</html>
